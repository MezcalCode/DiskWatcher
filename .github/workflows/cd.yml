name: Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      APP_NAME: DiskWatcher
      SCHEME: DiskWatcher
      PROJECT: DiskWatcher.xcodeproj
      BUILD_PATH: ${{ github.workspace }}/build/Release
      EXPORT_PATH: ${{ github.workspace }}/build/export
      DIST_PATH: ${{ github.workspace }}/dist
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
      NOTARYTOOL_APPLE_PASSWORD: ${{ secrets.NOTARYTOOL_APPLE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate signing secrets
        run: |
          for variable in \
            APPLE_TEAM_ID \
            DEVELOPER_ID_CERTIFICATE_P12 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            NOTARYTOOL_APPLE_ID \
            NOTARYTOOL_APPLE_PASSWORD
          do
            if [ -z "${!variable}" ]; then
              echo "Missing required secret: ${variable}"
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        run: |
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"

          echo "${DEVELOPER_ID_CERTIFICATE_P12}" | base64 -D > "${CERT_PATH}"
          security create-keychain -p "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

      - name: Read release version from Xcode
        id: version
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags --force

          MARKETING_VERSION="$(
            awk -F' = ' '/^MARKETING_VERSION[[:space:]]*=/{ print $2; exit }' Config/Versioning.xcconfig
          )"

          if [ -z "${MARKETING_VERSION}" ]; then
            echo "Unable to read MARKETING_VERSION from Config/Versioning.xcconfig."
            exit 1
          fi

          RELEASE_TAG="v${MARKETING_VERSION}"
          TAG_COMMIT="$(git rev-list -n 1 "${RELEASE_TAG}" 2>/dev/null || true)"
          RELEASE_HTTP_CODE="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"

          if [ -z "${TAG_COMMIT}" ]; then
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "${RELEASE_TAG}"
          elif [ "${TAG_COMMIT}" != "${GITHUB_SHA}" ]; then
            if [ "${RELEASE_HTTP_CODE}" = "200" ]; then
              echo "Tag ${RELEASE_TAG} already has a published GitHub Release. Bump MARKETING_VERSION before releasing a new build."
              exit 1
            fi

            echo "Tag ${RELEASE_TAG} points at ${TAG_COMMIT}; moving it to ${GITHUB_SHA} because no GitHub Release exists yet."
            git tag -f "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push --force origin "${RELEASE_TAG}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${MARKETING_VERSION}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Archive app
        run: |
          mkdir -p "${BUILD_PATH}"
          ARCHIVE_PATH="${BUILD_PATH}/${APP_NAME}.xcarchive"
          xcodebuild \
            archive \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -sdk macosx \
            -archivePath "${ARCHIVE_PATH}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export signed app
        run: |
          mkdir -p "${EXPORT_PATH}"
          EXPORT_OPTIONS_PLIST="${RUNNER_TEMP}/export-options.plist"
          cat > "${EXPORT_OPTIONS_PLIST}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath "${BUILD_PATH}/${APP_NAME}.xcarchive" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}"

      - name: Notarize app
        run: |
          APP_PATH="${EXPORT_PATH}/${APP_NAME}.app"
          if [ ! -d "${APP_PATH}" ]; then
            echo "App bundle not found at ${APP_PATH}"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl -a -vv --type exec "${APP_PATH}" || true

          mkdir -p "${DIST_PATH}"
          NOTARY_ZIP_PATH="${DIST_PATH}/${APP_NAME}-notarization.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "${APP_PATH}" \
            "${NOTARY_ZIP_PATH}"

          xcrun notarytool submit "${NOTARY_ZIP_PATH}" \
            --apple-id "${NOTARYTOOL_APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${NOTARYTOOL_APPLE_PASSWORD}" \
            --wait

          xcrun stapler staple "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl -a -vv --type exec "${APP_PATH}" || true

      - name: Create release zip
        run: |
          mkdir -p "${DIST_PATH}"
          APP_PATH="${EXPORT_PATH}/${APP_NAME}.app"
          if [ ! -d "${APP_PATH}" ]; then
            echo "App bundle not found at ${APP_PATH}"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent \
            "${APP_PATH}" \
            "${DIST_PATH}/${APP_NAME}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-${{ steps.version.outputs.release_tag }}
          path: ${{ env.DIST_PATH }}/${{ env.APP_NAME }}.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ steps.version.outputs.target_sha }}
          files: ${{ env.DIST_PATH }}/${{ env.APP_NAME }}.zip
          generate_release_notes: true
